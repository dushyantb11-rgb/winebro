name: winebro
description: "WineBro — Your elder brother in the world of wine, spirits & food pairing."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.5.1
  firebase_crashlytics: ^4.3.3
  firebase_storage: ^12.4.4
  google_sign_in: ^6.2.2

  # UI & Charts
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Camera & ML
  google_mlkit_text_recognition: ^0.15.0
  camera: ^0.11.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

  # Voice notes
  speech_to_text: ^7.0.0
  record: ^6.0.0
  path_provider: ^2.1.5

  # Friend graph
  flutter_contacts: ^1.1.9+2
  crypto: ^3.0.6

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1
  collection: ^1.19.1
  string_similarity: ^2.0.0
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^7.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#93003C"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/drinks/
    - assets/images/food/
    - assets/svg/
    - assets/products/
    - assets/dishes/

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: fonts/PlayfairDisplay-Regular.ttf
        - asset: fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: fonts/PlayfairDisplay-Black.ttf
          weight: 900
        - asset: fonts/PlayfairDisplay-Italic.ttf
          style: italic

    - family: Montserrat
      fonts:
        - asset: fonts/Montserrat-Light.ttf
          weight: 300
        - asset: fonts/Montserrat-Regular.ttf
        - asset: fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: fonts/Montserrat-Bold.ttf
          weight: 700

    - family: OpenSans
      fonts:
        - asset: fonts/OpenSans-Variable.ttf
        - asset: fonts/OpenSans-Italic-Variable.ttf
          style: italic
